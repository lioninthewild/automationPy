<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Audiobook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .w.highlight { background: #3b82f6; color: white; border-radius: 3px; padding: 0 1px; }
        .w { transition: background 0.15s, color 0.15s; }
        #text-display { white-space: pre-wrap; }
        .tab-content > .tab-pane { display: none; }
        .tab-content > .tab-pane.active { display: block; }
        .reader-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 800px;">
        <h1 class="text-center mb-4">PDF to Audiobook</h1>

        <div class="card shadow-sm">
            <div class="card-body p-4">

                <!-- Tab navigation -->
                <ul class="nav nav-tabs mb-3" id="inputTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-file" type="button">&#x1F4C4; File</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-text" type="button">&#x270F;&#xFE0F; Text</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-link" type="button">&#x1F517; Article Link</button>
                    </li>
                </ul>

                <!-- Tab panes -->
                <div class="tab-content">
                    <div class="tab-pane active" id="tab-file">
                        <form id="fileForm">
                            <div class="mb-3">
                                <label class="form-label">Upload a PDF</label>
                                <input class="form-control" type="file" name="pdf" accept=".pdf">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Upload</button>
                        </form>
                    </div>
                    <div class="tab-pane" id="tab-text">
                        <form id="textForm">
                            <div class="mb-3">
                                <label class="form-label">Paste your text</label>
                                <textarea class="form-control" name="content" rows="8" placeholder="Paste or type your text here..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Use Text</button>
                        </form>
                    </div>
                    <div class="tab-pane" id="tab-link">
                        <form id="linkForm">
                            <div class="mb-3">
                                <label class="form-label">Article URL</label>
                                <input class="form-control" type="url" name="url" placeholder="https://example.com/article">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Fetch Article</button>
                        </form>
                    </div>
                </div>

                <hr>

                <!-- Error -->
                <div id="errorDisplay" class="alert alert-danger" style="display:none"></div>

                <!-- Reader (always rendered, hidden until text is loaded) -->
                <div id="readerSection" style="display:{{ 'block' if full_text else 'none' }}">
                    <h5 class="mb-2">Reader</h5>
                    <div class="border rounded p-3 mb-2 bg-white" style="height:300px;overflow-y:auto">
                        <div id="text-display"></div>
                    </div>
                    <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
                        <button id="playBtn" class="btn btn-sm btn-outline-primary reader-btn" onclick="playReader()">&#x25B6; Play</button>
                        <button id="pauseBtn" class="btn btn-sm btn-outline-warning reader-btn" onclick="pauseReader()" disabled>&#x23F8;&#xFE0F; Pause</button>
                        <button id="stopBtn" class="btn btn-sm btn-outline-secondary reader-btn" onclick="stopReader()" disabled>&#x23F9;&#xFE0F; Stop</button>
                        <select id="voiceSelect" class="form-select form-select-sm" style="width:auto">
                            <option value="US Female">US Female</option>
                            <option value="US Male">US Male</option>
                            <option value="UK Female">UK Female</option>
                            <option value="UK Male">UK Male</option>
                        </select>
                        <label class="small text-muted">Speed</label>
                        <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0" style="width:80px">
                        <span id="speedLabel" class="small text-muted" style="min-width:1.8em">1.0x</span>
                        <span id="status" class="text-muted small"></span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        var fullText = {{ (full_text|tojson) if full_text else '""' }};
        var container = document.getElementById("text-display");
        var wordElements = [];
        var synth = window.speechSynthesis;
        var utterance = null;
        var currentWordIdx = 0;
        var playBtn = document.getElementById("playBtn");
        var pauseBtn = document.getElementById("pauseBtn");
        var stopBtn = document.getElementById("stopBtn");
        var statusEl = document.getElementById("status");
        var voiceSelect = document.getElementById("voiceSelect");
        var speedSlider = document.getElementById("speedSlider");
        var speedLabel = document.getElementById("speedLabel");
        var errorDisplay = document.getElementById("errorDisplay");
        var readerSection = document.getElementById("readerSection");

        function cleanText(text) {
            return text.replace(/\s+/g, ' ').replace(/[^a-zA-Z0-9\s.,!?'-]/g, '');
        }

        function initReader(text) {
            stopReader();
            fullText = cleanText(text);
            container.innerHTML = '';
            wordElements = [];
            var words = fullText.match(/\S+\s*/g) || [];
            words.forEach(function(w) {
                var span = document.createElement("span");
                span.className = "w";
                span.textContent = w;
                container.appendChild(span);
                wordElements.push(span);
            });
            currentWordIdx = 0;
        }

        speedSlider.addEventListener("input", function() {
            speedLabel.textContent = parseFloat(speedSlider.value).toFixed(1) + "x";
        });

        function setButtons(playing, paused) {
            playBtn.disabled = playing && !paused;
            pauseBtn.disabled = !playing || paused;
            stopBtn.disabled = !playing;
        }

        var voiceMap = { "US Female": "female", "US Male": "male", "UK Female": "female", "UK Male": "male" };
        var voiceLangMap = { "US Female": "en-US", "US Male": "en-US", "UK Female": "en-GB", "UK Male": "en-GB" };
        var availableVoices = [];
        var voicesReady = false;
        function loadVoices() {
            availableVoices = synth.getVoices();
            if (availableVoices.length > 0) voicesReady = true;
        }
        loadVoices();
        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = loadVoices;
        }

        function findVoice(preset) {
            if (!voicesReady) return null;
            var gender = voiceMap[preset];
            var lang = voiceLangMap[preset];
            for (var i = 0; i < availableVoices.length; i++) {
                var v = availableVoices[i];
                if (v.lang === lang && v.name.toLowerCase().indexOf(gender) >= 0) {
                    return v;
                }
            }
            for (var i = 0; i < availableVoices.length; i++) {
                var v = availableVoices[i];
                if (v.lang === lang) return v;
            }
            return null;
        }

        window.playReader = function() {
            if (!synth) { statusEl.textContent = "Speech not supported"; return; }
            if (synth.paused) { synth.resume(); setButtons(true, false); statusEl.textContent = "Playing"; return; }
            stopReader();
            currentWordIdx = 0;
            wordElements.forEach(function(el) { el.classList.remove("highlight"); });
            utterance = new SpeechSynthesisUtterance(fullText);
            utterance.rate = parseFloat(speedSlider.value);
            var selectedVoice = findVoice(voiceSelect.value);
            if (selectedVoice) utterance.voice = selectedVoice;
            utterance.onboundary = function(e) {
                if (e.name !== "word") return;
                wordElements.forEach(function(el) { el.classList.remove("highlight"); });
                if (currentWordIdx < wordElements.length) {
                    wordElements[currentWordIdx].classList.add("highlight");
                    wordElements[currentWordIdx].scrollIntoView({ block: "nearest" });
                }
                currentWordIdx++;
            };
            utterance.onstart = function() { setButtons(true, false); statusEl.textContent = "Playing"; };
            utterance.onend = function() { setButtons(false, false); statusEl.textContent = "Finished"; currentWordIdx = 0; };
            utterance.onerror = function() { setButtons(false, false); statusEl.textContent = "Error"; currentWordIdx = 0; };
            synth.speak(utterance);
        };
        window.pauseReader = function() { if (synth) { synth.pause(); setButtons(true, true); statusEl.textContent = "Paused"; } };
        window.stopReader = function() {
            if (synth) synth.cancel();
            setButtons(false, false);
            statusEl.textContent = "";
            currentWordIdx = 0;
            wordElements.forEach(function(el) { el.classList.remove("highlight"); });
        };

        // AJAX form submissions
        function submitForm(form, apiUrl) {
            var formData = new FormData(form);
            var btn = form.querySelector("button[type='submit']");
            var origText = btn.textContent;
            btn.disabled = true;
            btn.textContent = "Loading...";
            errorDisplay.style.display = "none";
            fetch(apiUrl, { method: "POST", body: formData })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.error) {
                        errorDisplay.textContent = data.error;
                        errorDisplay.style.display = "block";
                    } else if (data.full_text) {
                        initReader(data.full_text);
                        readerSection.style.display = "block";
                    }
                })
                .catch(function(err) {
                    errorDisplay.textContent = "Request failed: " + err.message;
                    errorDisplay.style.display = "block";
                })
                .finally(function() {
                    btn.disabled = false;
                    btn.textContent = origText;
                });
        }

        document.getElementById("textForm").addEventListener("submit", function(e) {
            e.preventDefault();
            submitForm(this, "/api/text");
        });
        document.getElementById("fileForm").addEventListener("submit", function(e) {
            e.preventDefault();
            submitForm(this, "/api/upload");
        });
        document.getElementById("linkForm").addEventListener("submit", function(e) {
            e.preventDefault();
            submitForm(this, "/api/fetch-article");
        });

        // Initialize reader on page load if full_text is present
        {% if full_text %}
        initReader({{ full_text|tojson }});
        {% endif %}
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
