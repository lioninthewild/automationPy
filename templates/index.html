<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Audiobook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .w.highlight { background: #3b82f6; color: white; border-radius: 3px; padding: 0 1px; }
        .w { transition: background 0.15s, color 0.15s; }
        #text-display { white-space: pre-wrap; }
        .tab-content > .tab-pane { display: none; }
        .tab-content > .tab-pane.active { display: block; }
        .reader-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    </style>
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 800px;">
        <h1 class="text-center mb-4">PDF to Audiobook</h1>

        <div class="card shadow-sm">
            <div class="card-body p-4">

                <!-- Tab navigation -->
                <ul class="nav nav-tabs mb-3" id="inputTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-file" type="button">📄 File</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-text" type="button">✏️ Text</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-link" type="button">🔗 Article Link</button>
                    </li>
                </ul>

                <!-- Tab panes -->
                <div class="tab-content">
                    <!-- File tab -->
                    <div class="tab-pane active" id="tab-file">
                        <form method="post" enctype="multipart/form-data">
                            <input type="hidden" name="input_type" value="file">
                            <div class="mb-3">
                                <label class="form-label">Upload a PDF</label>
                                <input class="form-control" type="file" name="pdf" accept=".pdf">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Upload</button>
                        </form>
                    </div>

                    <!-- Text tab -->
                    <div class="tab-pane" id="tab-text">
                        <form method="post">
                            <input type="hidden" name="input_type" value="text">
                            <div class="mb-3">
                                <label class="form-label">Paste your text</label>
                                <textarea class="form-control" name="content" rows="8" placeholder="Paste or type your text here..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Use Text</button>
                        </form>
                    </div>

                    <!-- Link tab -->
                    <div class="tab-pane" id="tab-link">
                        <form method="post" action="/fetch-article">
                            <div class="mb-3">
                                <label class="form-label">Article URL</label>
                                <input class="form-control" type="url" name="url" placeholder="https://example.com/article">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Fetch Article</button>
                        </form>
                    </div>
                </div>

                <hr>

                <!-- Error -->
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <!-- Reader -->
                {% if full_text %}
                    <h5 class="mb-2">Reader</h5>
                    <div class="border rounded p-3 mb-2 bg-white" style="height:300px;overflow-y:auto">
                        <div id="text-display"></div>
                    </div>
                    <div class="d-flex gap-2 align-items-center mb-3">
                        <button id="playBtn" class="btn btn-sm btn-outline-primary reader-btn" onclick="playReader()">▶ Play</button>
                        <button id="pauseBtn" class="btn btn-sm btn-outline-warning reader-btn" onclick="pauseReader()" disabled>⏸ Pause</button>
                        <button id="stopBtn" class="btn btn-sm btn-outline-secondary reader-btn" onclick="stopReader()" disabled>⏹ Stop</button>
                        <span id="status" class="text-muted small"></span>
                    </div>
                {% endif %}

            </div>
        </div>
    </div>

    <!-- Reader JS -->
    <script>
        {% if full_text %}
        (function() {
            var fullText = {{ full_text|tojson }}.replace(/\s+/g, ' ').replace(/[^a-zA-Z0-9\s.,!?'-]/g, '');
            var container = document.getElementById("text-display");
            var words = fullText.match(/\S+\s*/g) || [];
            var charOffset = 0;
            var wordElements = [];
            words.forEach(function(w) {
                var span = document.createElement("span");
                span.className = "w";
                span.dataset.start = charOffset;
                span.dataset.end = charOffset + w.length;
                span.textContent = w;
                container.appendChild(span);
                wordElements.push(span);
                charOffset += w.length;
            });

            var synth = window.speechSynthesis;
            var utterance = null;
            var currentWordIdx = 0;
            var playBtn = document.getElementById("playBtn");
            var pauseBtn = document.getElementById("pauseBtn");
            var stopBtn = document.getElementById("stopBtn");
            var statusEl = document.getElementById("status");

            function setButtons(playing, paused) {
                playBtn.disabled = playing && !paused;
                pauseBtn.disabled = !playing || paused;
                stopBtn.disabled = !playing;
            }

            function findSpan(charIndex) {
                for (var i = 0; i < wordElements.length; i++) {
                    var s = wordElements[i];
                    if (charIndex >= parseInt(s.dataset.start) && charIndex < parseInt(s.dataset.end)) {
                        return i;
                    }
                }
                return -1;
            }

            window.playReader = function() {
                if (!synth) { statusEl.textContent = "Speech not supported"; return; }
                if (synth.paused) { synth.resume(); setButtons(true, false); statusEl.textContent = "Playing"; return; }
                stopReader();
                currentWordIdx = 0;
                wordElements.forEach(function(el) { el.classList.remove("highlight"); });

                utterance = new SpeechSynthesisUtterance(fullText);
                utterance.rate = 1.0;
                utterance.onboundary = function(e) {
                    if (e.name !== "word") return;
                    wordElements.forEach(function(el) { el.classList.remove("highlight"); });
                    var idx = findSpan(e.charIndex);
                    if (idx >= 0) {
                        wordElements[idx].classList.add("highlight");
                        wordElements[idx].scrollIntoView({ block: "nearest" });
                        currentWordIdx = idx + 1;
                    }
                };
                utterance.onstart = function() { setButtons(true, false); statusEl.textContent = "Playing"; };
                utterance.onend = function() { setButtons(false, false); statusEl.textContent = "Finished"; currentWordIdx = 0; };
                utterance.onerror = function() { setButtons(false, false); statusEl.textContent = "Error"; currentWordIdx = 0; };
                synth.speak(utterance);
            };
            window.pauseReader = function() { if (synth) { synth.pause(); setButtons(true, true); statusEl.textContent = "Paused"; } };
            window.stopReader = function() {
                if (synth) synth.cancel();
                setButtons(false, false);
                statusEl.textContent = "";
                currentWordIdx = 0;
                wordElements.forEach(function(el) { el.classList.remove("highlight"); });
            };
        })();
        {% endif %}
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
