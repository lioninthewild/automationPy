<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Audiobook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #text-display { white-space: pre-wrap; font-size: 1.1rem; line-height: 1.7; }
        .tab-content > .tab-pane { display: none; }
        .tab-content > .tab-pane.active { display: block; }
        .reader-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 800px;">
        <h1 class="text-center mb-4">PDF to Audiobook</h1>

        <div class="card shadow-sm">
            <div class="card-body p-4">

                <!-- Tab navigation -->
                <ul class="nav nav-tabs mb-3" id="inputTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-file" type="button">&#x1F4C4; File</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-text" type="button">&#x270F;&#xFE0F; Text</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-link" type="button">&#x1F517; Article Link</button>
                    </li>
                </ul>

                <!-- Tab panes -->
                <div class="tab-content">
                    <div class="tab-pane active" id="tab-file">
                        <form id="fileForm" method="post" enctype="multipart/form-data" action="/">
                            <input type="hidden" name="input_type" value="file">
                            <div class="mb-3">
                                <label class="form-label">Upload a PDF</label>
                                <input type="file" name="pdf" accept=".pdf" id="fileInput" style="display:none">
                                <div>
                                    <button type="button" class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Choose File</button>
                                    <span id="fileName" class="ms-2 text-muted small">No file chosen</span>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Upload</button>
                        </form>
                    </div>
                    <div class="tab-pane" id="tab-text">
                        <form id="textForm" method="post" action="/">
                            <input type="hidden" name="input_type" value="text">
                            <div class="mb-3">
                                <label class="form-label">Paste your text</label>
                                <textarea class="form-control" name="content" rows="8" placeholder="Paste or type your text here..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Use Text</button>
                        </form>
                    </div>
                    <div class="tab-pane" id="tab-link">
                        <form id="linkForm" method="post" action="/fetch-article">
                            <div class="mb-3">
                                <label class="form-label">Article URL</label>
                                <input class="form-control" type="url" name="url" placeholder="https://example.com/article">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Fetch Article</button>
                        </form>
                    </div>
                </div>

                <hr>

                <!-- Error -->
                <div id="errorDisplay" class="alert alert-danger" style="display:none"></div>

                <!-- Reader (always rendered, hidden until text is loaded) -->
                <div id="readerSection" style="display:{{ 'block' if full_text else 'none' }}">
                    <h5 class="mb-2">Reader</h5>
                    <div class="border rounded p-3 mb-2 bg-white" style="height:300px;overflow-y:auto">
                        <div id="text-display"></div>
                    </div>
                    <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
                        <button id="playBtn" class="btn btn-sm btn-outline-primary reader-btn" onclick="playReader()">&#x25B6; Play</button>
                        <button id="stopBtn" class="btn btn-sm btn-outline-secondary reader-btn" onclick="stopReader()" disabled>&#x23F9;&#xFE0F; Stop</button>
                        <label class="small text-muted">Speed</label>
                        <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0" style="width:80px">
                        <span id="speedLabel" class="small text-muted" style="min-width:1.8em">1.0x</span>
                        <span id="status" class="text-muted small"></span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <audio id="audioPlayer" style="display:none"></audio>

    <script>
        var fullText = {{ (full_text|tojson) if full_text else '""' }};
        var container = document.getElementById("text-display");
        var playBtn = document.getElementById("playBtn");
        var stopBtn = document.getElementById("stopBtn");
        var statusEl = document.getElementById("status");
        var speedSlider = document.getElementById("speedSlider");
        var speedLabel = document.getElementById("speedLabel");
        var errorDisplay = document.getElementById("errorDisplay");
        var readerSection = document.getElementById("readerSection");
        var audioPlayer = document.getElementById("audioPlayer");
        var audioUrl = null;

        function cleanText(text) {
            return text.replace(/\s+/g, ' ');
        }

        function initReader(text) {
            stopReader();
            fullText = cleanText(text);
            container.textContent = fullText;
            audioUrl = null;
        }

        speedSlider.addEventListener("input", function() {
            speedLabel.textContent = parseFloat(speedSlider.value).toFixed(1) + "x";
            audioPlayer.playbackRate = parseFloat(speedSlider.value);
        });

        function setButtons(playing) {
            playBtn.disabled = playing;
            stopBtn.disabled = !playing;
        }

        audioPlayer.addEventListener("play", function() {
            setButtons(true);
            statusEl.textContent = "Playing";
        });
        audioPlayer.addEventListener("ended", function() {
            setButtons(false);
            statusEl.textContent = "Finished";
            audioPlayer.currentTime = 0;
        });
        audioPlayer.addEventListener("pause", function() {
            setButtons(false);
        });
        audioPlayer.addEventListener("error", function() {
            setButtons(false);
            statusEl.textContent = "Playback error";
        });

        window.playReader = function() {
            if (audioUrl) {
                audioPlayer.play();
                return;
            }
            if (!fullText || !fullText.trim()) {
                statusEl.textContent = "No text to read";
                return;
            }
            statusEl.textContent = "Generating audio...";
            playBtn.disabled = true;
            var formData = new FormData();
            formData.append("text", fullText);
            fetch("/api/speak", { method: "POST", body: formData })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.error) {
                        statusEl.textContent = "Error: " + data.error;
                        playBtn.disabled = false;
                        return;
                    }
                    audioUrl = data.audio_url;
                    audioPlayer.src = audioUrl;
                    audioPlayer.playbackRate = parseFloat(speedSlider.value);
                    audioPlayer.play();
                })
                .catch(function(err) {
                    statusEl.textContent = "Request failed";
                    playBtn.disabled = false;
                });
        };
        window.stopReader = function() {
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            setButtons(false);
            statusEl.textContent = "";
        };

        // AJAX form submissions
        function submitForm(form, apiUrl) {
            var formData = new FormData(form);
            var btn = form.querySelector("button[type='submit']");
            var origText = btn.textContent;
            btn.disabled = true;
            btn.textContent = "Loading...";
            errorDisplay.style.display = "none";
            fetch(apiUrl, { method: "POST", body: formData })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.error) {
                        errorDisplay.textContent = data.error;
                        errorDisplay.style.display = "block";
                    } else if (data.full_text) {
                        initReader(data.full_text);
                        readerSection.style.display = "block";
                    }
                })
                .catch(function(err) {
                    errorDisplay.textContent = "Request failed: " + err.message;
                    errorDisplay.style.display = "block";
                })
                .finally(function() {
                    btn.disabled = false;
                    btn.textContent = origText;
                });
        }

        document.getElementById("fileInput").addEventListener("change", function() {
            document.getElementById("fileName").textContent = this.files.length > 0 ? this.files[0].name : "No file chosen";
        });

        document.getElementById("textForm").addEventListener("submit", function(e) {
            e.preventDefault();
            submitForm(this, "/api/text");
        });
        document.getElementById("fileForm").addEventListener("submit", function(e) {
            e.preventDefault();
            submitForm(this, "/api/upload");
        });
        document.getElementById("linkForm").addEventListener("submit", function(e) {
            e.preventDefault();
            submitForm(this, "/api/fetch-article");
        });

        // Initialize reader on page load if full_text is present
        {% if full_text %}
        initReader({{ full_text|tojson }});
        {% endif %}
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
